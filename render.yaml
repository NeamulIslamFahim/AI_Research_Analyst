services:
  - type: web
    name: ai-research-assistant
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm install
      npm run build
      cd ..
    startCommand: PYTHONPATH=. uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: NODE_VERSION
        value: "20.11.1"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/opt/render/project/.cache/sentence-transformers"
      - key: HF_HOME
        value: "/opt/render/project/.cache/huggingface"
      - key: TRANSFORMERS_CACHE
        value: "/opt/render/project/.cache/huggingface/transformers"
      - key: PAPER_DB_DIR
        value: "data/paper_db"
      - key: FAISS_PERSIST_DIR
        value: "data/vectorstore"
      - key: ASSISTANT_MODEL_DIR
        value: "data/trained_assistant"
      - key: ASSISTANT_TRAIN_ON_STARTUP
        value: "false"
      - key: ASSISTANT_MODEL_ONLY
        value: "false"
      - key: USE_GPT_OSS
        value: "false"
      - key: REACT_APP_ASSISTANT_ONLY
        value: "false"
